name: Ruff

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - name: Ruff lint
        run: uvx ruff@0.14.5 check .
      - name: Ruff format check
        run: uvx ruff@0.14.5 format --check .

  # Stable Required check: runs even when `ruff` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports. Keeps the
  # `pre-commit-passed` name the branch ruleset requires.
  pre-commit-passed: # required-check: true
    if: always()
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
